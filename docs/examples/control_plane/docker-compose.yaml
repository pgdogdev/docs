x-pgdog: &pgdog
  image: ghcr.io/pgdogdev/pgdog-enterprise:v2026-07-09
  command:
    [
      "pgdog",
      "--config",
      "/etc/pgdog/pgdog.toml",
      "--users",
      "/etc/secrets/pgdog/users.toml",
    ]
  mem_limit: 1g
  environment:
    PGPASSWORD: postgres
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "psql -h 127.0.0.1 -p 6432 -U postgres -d postgres -tAc 'SELECT 1' || exit 1",
      ]
    interval: 5s
    timeout: 5s
    retries: 5
  depends_on:
    postgres:
      condition: service_healthy
    control:
      condition: service_healthy

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7

  control:
    image: ghcr.io/pgdogdev/pgdog-enterprise/control:v2026-07-09
    ports:
      - "8099:8080"
    environment:
      RUST_LOG: warn
      CONTROL_CONFIG: /etc/pgdog-control/control.toml
    configs:
      - source: control_config
        target: /etc/pgdog-control/control.toml
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    depends_on:
      redis:
        condition: service_started

  pgdog:
    <<: *pgdog
    ports:
      - "6432:6432"
    configs: &pgdog_one_configs
      - source: pgdog_config
        target: /etc/pgdog/pgdog.toml
      - source: pgdog_users
        target: /etc/secrets/pgdog/users.toml

  pgdog2:
    <<: *pgdog
    ports:
      - "6433:6432"
    configs: &pgdog_two_configs
      - source: pgdog_config2
        target: /etc/pgdog/pgdog.toml
      - source: pgdog_users
        target: /etc/secrets/pgdog/users.toml

  pgdog3:
    <<: *pgdog
    configs: *pgdog_one_configs

  pgdog4:
    <<: *pgdog
    configs: *pgdog_two_configs

  pgbench:
    image: postgres:17
    environment:
      PGPORT: "6432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    configs:
      - source: pgbench_script
        target: /scripts/pgbench.sql
    command:
      - bash
      - -c
      - |
        for host in pgdog pgdog2 pgdog3 pgdog4; do
          pgbench -h "$$host" -f /scripts/pgbench.sql -c 4 -t 1000000000 --no-vacuum &
        done
        wait
    depends_on:
      pgdog:
        condition: service_healthy
      pgdog2:
        condition: service_healthy
      pgdog3:
        condition: service_healthy
      pgdog4:
        condition: service_healthy

configs:
  control_config:
    content: |
      [redis]
      url = "redis://redis:6379"

  pgdog_config:
    content: |
      [general]
      port = 6432
      load_schema = "on"

      [[databases]]
      name = "postgres"
      host = "postgres"
      port = 5432

      [control]
      endpoint = "http://control:8080"
      token = "pgdog-one"

      [admin]
      user = "pgdog"
      password = "pgdog"

      [query_stats]
      enabled = true

      [qos]
      enabled = true

  pgdog_config2:
    content: |
      [general]
      port = 6432
      load_schema = "on"

      [[databases]]
      name = "postgres"
      host = "postgres"
      port = 5432

      [control]
      endpoint = "http://control:8080"
      token = "pgdog-two"

      [admin]
      user = "pgdog"
      password = "pgdog"

      [query_stats]
      enabled = true

      [qos]
      enabled = true

  pgdog_users:
    content: |
      [[users]]
      name = "postgres"
      password = "postgres"
      database = "postgres"

  pgbench_script:
    content: |
      SELECT 1;
      SELECT 2;
      SELECT pg_sleep(0.5);
      SELECT 1, 2, 3, pg_sleep(1);
